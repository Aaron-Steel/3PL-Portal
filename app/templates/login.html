{% extends "base.html" %}
{% block title %}Sign in — Macgear 3PL Portal{% endblock %}
{% block body %}
<div class="login-wrap">
  <form class="login-card" method="post" action="/login">
    <h1>Macgear 3PL Portal</h1>
    {% if notice %}<p class="notice">{{ notice }}</p>{% endif %}
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label>Email<input name="email" type="email" autofocus autocomplete="username"></label>
    <label>Password<input name="password" type="password" autocomplete="current-password"></label>
    <button type="submit">Sign in</button>
    <p class="login-alt"><a href="/forgot">Forgot your password?</a></p>
  </form>
</div>
{% endblock %}
