{% extends "base.html" %}
{% block title %}{{ heading }} — Macgear 3PL Settings{% endblock %}
{% block body %}
<div class="adminwrap">
  <header class="adminhead">
    <div class="ah-brand">Macgear 3PL · <b>Settings</b></div>
    <nav class="ah-nav">
      <a href="/admin/users" class="{{ 'on' if section == 'users' }}">Users</a>
      <a href="/admin/customers" class="{{ 'on' if section == 'customers' }}">Customers &amp; rate cards</a>
    </nav>
    <a class="ah-back" href="/">← Back to portal</a>
    <button class="themetoggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
      <svg class="i-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </header>
  <main class="adminmain">
    {% block admin %}{% endblock %}
  </main>
</div>
{% endblock %}
