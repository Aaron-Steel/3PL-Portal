{% extends "admin_base.html" %}
{% set heading = "User" %}
{% block admin %}
<div class="a-head"><h1>{{ "Edit user" if u else "New user" }}</h1>
  <a class="link" href="/admin/users">← All users</a></div>

<form class="card formcard" method="post" action="{{ '/admin/users/' ~ u.id if u else '/admin/users/new' }}">
  <div class="frow">
    <label class="f">Email<input name="email" type="email" value="{{ u.email if u else '' }}" required></label>
    <label class="f">Role
      <select name="role" id="role" onchange="applyRole()">
        {% for r in ROLES %}<option value="{{ r }}" {{ 'selected' if (u.role if u else 'customer') == r }}>{{ r }}</option>{% endfor %}
      </select>
    </label>
  </div>
  <div class="frow">
    <label class="f" id="custwrap">Customer (for customer role)
      <select name="customer_id">
        <option value="">— none (internal) —</option>
        {% for c in customers %}<option value="{{ c.id }}" {{ 'selected' if u and u.customer_id == c.id }}>{{ c.name }}</option>{% endfor %}
      </select>
    </label>
    <label class="f">Password {% if u %}<span class="sub2">(leave blank to keep)</span>{% endif %}
      <input name="password" type="text" placeholder="{{ 'unchanged' if u else 'set initial password' }}" {{ 'required' if not u }}></label>
  </div>

  <div class="perms">
    <div class="perms-h">Visible views <span class="sub2">— defaults by role; tick to override per user</span></div>
    <div class="checks">
      {% for k in view_keys %}
      <label class="chk"><input type="checkbox" name="views" value="{{ k }}" {{ 'checked' if k in selected }} {{ 'data-billing' if k == 'billing' }}> {{ VIEW_LABELS[k] }}</label>
      {% endfor %}
    </div>
  </div>

  <label class="chk"><input type="checkbox" name="active" {{ 'checked' if (u.active if u else True) }}> Active (can sign in)</label>

  <div class="formact">
    <button class="btn primary" type="submit">{{ "Save changes" if u else "Create user" }}</button>
    {% if u %}<span class="grow"></span>{% endif %}
  </div>
</form>

{% if u %}
<form method="post" action="/admin/users/{{ u.id }}/delete" onsubmit="return confirm('Delete {{ u.email }}? This cannot be undone.')">
  <button class="btn danger" type="submit">Delete user</button>
</form>
{% endif %}

<script>
  var ALL = {{ view_keys|tojson }};
  function applyRole(){
    var role = document.getElementById('role').value;
    var defaults = role === 'customer' ? ALL.filter(function(v){return v!=='billing'}) : ALL;
    document.querySelectorAll('input[name="views"]').forEach(function(cb){
      if(role === 'customer' && cb.value === 'billing'){ cb.checked=false; cb.disabled=true; }
      else { cb.disabled=false; cb.checked = defaults.indexOf(cb.value) !== -1; }
    });
    document.getElementById('custwrap').style.opacity = role === 'customer' ? '1' : '.5';
  }
</script>
{% endblock %}
